services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - meilisearch

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: health_api
      POSTGRES_USER: health_api
      POSTGRES_PASSWORD: health_api
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"

volumes:
  postgres-data:
